name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_DATABASE: zhizhi
      MYSQL_ACCOUNT: root
      MYSQL_PASSWORD: root
      APP_TIMEZONE: Asia/Shanghai
      BACKEND_BASE_URL: http://127.0.0.1:4000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:4000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            src/backend/pnpm-lock.yaml
            src/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir src/backend install --frozen-lockfile
          pnpm --dir src/frontend install --frozen-lockfile

      - name: Initialize MySQL
        run: mysql -h 127.0.0.1 -u root -proot < src/backend/db/schema.sql

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test:unit

      - name: API integration tests
        run: pnpm test:integration

      - name: Core E2E tests
        run: pnpm test:e2e
